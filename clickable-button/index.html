<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Content Changer</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">
        <h2 id="mainHeading">Welcome to JavaScript Lab</h2>

        <input
            type="text"
            id="userInput"
            placeholder="Enter new heading text"
        >

        <div class="btn-group">
            <button id="changeTextBtn">Change Heading</button>
            <button id="bgColorBtn">Change Background</button>
            <button id="fontSizeBtn">Increase Font Size</button>
            <button id="toggleBtn">Hide Paragraph</button>
            <button id="resetBtn">Reset</button>
        </div>

        <p id="paragraph">
            This is a sample paragraph. JavaScript events can dynamically change content.
        </p>
    </div>

    <script src="main.js"></script>

</body>
</html>
